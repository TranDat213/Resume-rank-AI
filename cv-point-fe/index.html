<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CVRank — AI-Powered Recruitment</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ═══════════════════════════════════════════
     AUTH MODAL
════════════════════════════════════════════════ -->
<div class="modal-backdrop" id="authModal" onclick="handleBackdropClick(event)">
  <div class="modal-box">

    <div class="modal-logo">CV<span>Rank</span></div>
    <div class="modal-title" id="modalTitle">Sign in to continue</div>
    <div class="modal-sub"   id="modalSub">You need an account to rank CVs</div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin"    onclick="setAuthMode('login')">Login</button>
      <button class="auth-tab"        id="tabRegister" onclick="setAuthMode('register')">Register</button>
    </div>

    <div class="auth-form" id="authForm">
      <div class="field-group" id="nameGroup" style="display:none">
        <label class="field-label">Full name</label>
        <input class="field-input" id="authName" type="text" placeholder="Nguyen Van A" autocomplete="name" />
      </div>

      <div class="field-group">
        <label class="field-label">Email</label>
        <input class="field-input" id="authEmail" type="email" placeholder="you@example.com" autocomplete="email" />
      </div>

      <div class="field-group">
        <label class="field-label">Password</label>
        <div class="pw-wrap">
          <input class="field-input" id="authPassword" type="password" placeholder="••••••••" autocomplete="current-password" />
          <button class="pw-toggle" onclick="togglePw()" type="button" title="Show password">👁</button>
        </div>
      </div>

      <div class="auth-error" id="authError" style="display:none"></div>

      <button class="btn-auth" id="btnAuth" onclick="submitAuth()">
        <span id="btnAuthLabel">Sign in</span>
        <span class="btn-spinner hidden" id="authSpinner"></span>
      </button>
    </div>

    <button class="modal-close" onclick="closeModal()" title="Close">×</button>
  </div>
</div>


<!-- ═══════════════════════════════════════════
     MAIN APP
════════════════════════════════════════════════ -->
<div class="wrap">

  <!-- Header -->
  <header>
    <div class="logo">
      CV<span>Rank</span>
      <sub>AI-powered · cv_AI_project</sub>
    </div>
    <div class="header-right">
      <div class="status-pill" id="statusPill">
        <span class="status-dot"></span>
        <span id="statusText">CHECKING...</span>
      </div>

      <!-- Logged in -->
      <div class="user-chip hidden" id="userChip">
        <div class="user-avatar" id="userAvatar">?</div>
        <span class="user-email" id="userEmail"></span>
        <button class="btn-logout" onclick="logout()" title="Log out">↩</button>
      </div>

      <!-- Logged out -->
      <button class="btn-signin" id="btnSignIn" onclick="openModal('login')" style="display:none">
        Sign in
      </button>
    </div>
  </header>

  <!-- Input grid -->
  <div class="main-grid">

    <div class="card">
      <div class="card-label">Job Description</div>
      <textarea id="jd"
        placeholder="Paste the job description here...&#10;&#10;Example:&#10;We are looking for a Python developer with 2+ years of experience in Flask, Docker, and machine learning. Bachelor degree required."></textarea>
      <div class="jd-meta" id="jdMeta"></div>
    </div>

    <div class="card">
      <div class="card-label">Upload CVs <span class="badge" id="cvCount">0</span></div>
      <div class="drop-zone" id="dropZone">
        <input type="file" id="cvInput" accept=".pdf,.txt,.png,.jpg,.jpeg" multiple />
        <div class="drop-icon">📄</div>
        <div class="drop-text">
          <strong>Click to browse</strong> or drag & drop<br/>
          PDF, TXT, PNG, JPG · Multiple files OK
        </div>
      </div>
      <div class="file-list" id="fileList"></div>
    </div>

  </div>

  <!-- Actions -->
  <div class="submit-row">
    <button class="btn-rank" id="rankBtn" onclick="rankCVs()">⚡ Rank CVs</button>
    <button class="btn-clear" onclick="clearAll()">Clear all</button>
    <span class="hint-text" id="hintText">Add a JD and at least one CV to start</span>
  </div>

  <div class="loading-bar" id="loadingBar">
    <div class="loading-label" id="loadingLabel">Analysing CVs…</div>
  </div>
  <div id="errorBox"></div>
  <div id="results"></div>

</div><!-- /.wrap -->


<!-- ═══════════════════════════════════════════
     JS MODULES
     Thứ tự load quan trọng:
       1. config   — constants (ENDPOINTS)
       2. utils    — helpers dùng chung
       3. auth     — JWT, modal
       4. files    — file upload
       5. jd       — JD textarea
       6. suggestions — build suggestions
       7. ranking  — call API, render results
       8. app      — bootstrap (DOMContentLoaded)
════════════════════════════════════════════════ -->
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/files.js"></script>
<script src="js/jd.js"></script>
<script src="js/suggestions.js"></script>
<script src="js/ranking.js"></script>
<script src="js/app.js"></script>

</body>
</html>
